{% extends "auctions/layout.html" %}

{% block body %}
    <h2>My Watchlist </h2>
      <div class = "row">
        {% for listing in listings %}
            <div class = "col-md-4">
                <div class ="card md-4">
                    <div class ="card-body">
                        <h5 class="card-title">{{ listing.title }}</h5>
                        <p class="card-text">{{ listing.description|truncatewords:20 }}</p>
                        <a href="{% url 'listing_detail' listing.id %}" class="btn btn-primary">View Details</a>
                    </div>
                </div>
            </div>
            {% empty %}
              <div class ="col-12">
                <p>You haven't added anything to your watchlist yet.</p>
                <a href ="{% url 'index' %}" class="btn btn-outline-secondary">Browse Listings</a>
             </div>
             {% endfor %}
        </div>
        {% endblock %}

{% extends "auctions/layout.html" %}

{% block body %}
    <h2>Edit Listing: {{ listing.title }}</h2>
    <form action="{% url 'edit_listing' listing.id %}" method="post">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label style="display: block; font-weight: bold;">Title</label>
            <input type="text" name="title"  value="{{ listing.title }}" required style="width:100%; padding:8px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; font-weight: bold;">Description</label>
            <textarea name="description" rows="5" required style="width:100%; padding:8px;">{{ listing.description }}</textarea>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; font-weight: bold;">Starting Bid ($)</label>
            <input type="number" step="0.01" name="starting_bid" value="{{ listing.starting_bid }}" required style="width:100%; padding:8px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; font-weight: bold;">Image URL (Optional)</label>
            <input type="url" name="image_url" value="{{ listing.image_url }}" style="width:100%; padding:8px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; font-weight: bold;">Category (Optional)</label>
            <input type="text" name="category" value="{{ listing.category }}" style="width:100%; padding:8px;">
        </div>

        <button type="submit" style="background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px;cursor: pointer;">Update Listing</button>
        
        <a href="{% url 'my_listings' %}" style="margin-left: 10px; color: #007bff; text-decoration: none;">Cancel</a>
    </form>
{% endblock %}
